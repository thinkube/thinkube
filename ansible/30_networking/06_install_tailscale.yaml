---
# 06_install_tailscale.yaml - Install and configure Tailscale on cluster nodes
#
# Purpose:
#   Installs Tailscale on nodes that don't have it, joins the tailnet,
#   and configures firewall/IP forwarding.
#   Run BEFORE 11_setup_tailscale.yaml (which handles load balancer VIP routing).
#
# Requirements:
#   - SSH access to all target nodes (key-based auth via ssh-setup)
#   - Tailscale auth key (from https://login.tailscale.com/admin/settings/keys)
#   - Tailscale API token for route management
#
# Variables:
#   - tailscale_auth_key: Tailscale auth key (from inventory or extra_vars)
#   - tailscale_api_token: Tailscale API token (from inventory or extra_vars)
#
# Run with:
#   Used by the installer's overlay-setup page via WebSocket playbook streaming.
#   Can also be run manually:
#   ./scripts/tk_ansible ansible/30_networking/06_install_tailscale.yaml

- name: Install and Configure Tailscale on All Nodes
  hosts: overlay_nodes
  gather_facts: true
  serial: 1
  become: true

  tasks:
    # Phase 1: Check existing Tailscale state
    - name: Check if Tailscale is installed
      ansible.builtin.command: which tailscale
      register: ts_installed
      changed_when: false
      failed_when: false

    # Phase 2: Install Tailscale if missing
    - name: Install Tailscale
      when: ts_installed.rc != 0
      block:
        - name: Download and run Tailscale installer
          ansible.builtin.shell: curl -fsSL https://tailscale.com/install.sh | sh
          args:
            creates: /usr/bin/tailscale
          register: ts_install_result

        - name: Enable and start Tailscale service
          ansible.builtin.systemd:
            name: tailscaled
            enabled: yes
            state: started

        - name: Wait for Tailscale service to initialize
          ansible.builtin.pause:
            seconds: 3

    # Phase 3: Clean up stale tailnet devices before connecting.
    # When a server is wiped and reinstalled, the old device entry stays on
    # the tailnet. `tailscale up --hostname=vilanova2` then registers a new
    # device as `vilanova2-2` instead of reusing the name. We delete any
    # stale device with the same hostname via the API before connecting, but
    # only when the daemon isn't already authed and running (i.e., fresh
    # install or post-wipe).
    - name: Check current Tailscale daemon state
      ansible.builtin.command: tailscale status --json
      register: ts_daemon_state
      changed_when: false
      failed_when: false

    - name: Remove stale tailnet devices matching our hostname
      when: >
        ts_daemon_state.rc != 0 or
        ts_daemon_state.stdout | length == 0 or
        (ts_daemon_state.stdout | from_json).BackendState != 'Running'
      block:
        - name: Fetch all tailnet devices
          ansible.builtin.uri:
            url: "https://api.tailscale.com/api/v2/tailnet/-/devices"
            method: GET
            headers:
              Authorization: "Bearer {{ tailscale_api_token }}"
          register: ts_all_devices
          delegate_to: localhost
          become: false

        - name: Delete stale devices matching our hostname
          ansible.builtin.uri:
            url: "https://api.tailscale.com/api/v2/device/{{ item.nodeId }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ tailscale_api_token }}"
            status_code: [200, 204]
          loop: "{{ ts_all_devices.json.devices | selectattr('hostname', 'equalto', inventory_hostname) | list }}"
          delegate_to: localhost
          become: false

    # Phase 4: Bring the tailnet connection up. `tailscale up` is idempotent
    # — it's a no-op when the daemon is already authed and online with the
    # same parameters, and it kicks a stale/offline daemon back to life. We
    # ALWAYS run it because trusting "BackendState=Running" misses the case
    # where the coordination connection has died and Self.Online is false.
    - name: Connect to Tailscale tailnet (idempotent — recovers stale daemons)
      ansible.builtin.command: >
        tailscale up
        --authkey={{ tailscale_auth_key }}
        --hostname={{ inventory_hostname }}
        --accept-routes
      register: ts_join_result
      changed_when: ts_join_result.stdout != "" or ts_join_result.stderr != ""

    # Phase 5: Wait for the daemon to actually report Online to the
    # coordination server. Without this, peer addresses haven't been
    # learned yet and the cross-node ping in the next play fails.
    - name: Wait for Tailscale to report Online
      ansible.builtin.command: tailscale status --json
      register: ts_status
      changed_when: false
      until:
        - ts_status.rc == 0
        - ts_status.stdout | length > 0
        - (ts_status.stdout | from_json).BackendState == 'Running'
        - (ts_status.stdout | from_json).Self.Online | default(false) | bool
        - (ts_status.stdout | from_json).Self.TailscaleIPs | default([]) | length > 0
      retries: 30
      delay: 2

    - name: Extract Tailscale IP and device info
      ansible.builtin.set_fact:
        ts_assigned_ip: "{{ (ts_status.stdout | from_json).Self.TailscaleIPs[0] }}"
        ts_device_id: "{{ (ts_status.stdout | from_json).Self.ID }}"
        ts_hostname: "{{ (ts_status.stdout | from_json).Self.DNSName }}"

    - name: Surface any Tailscale health warnings
      ansible.builtin.debug:
        msg: "Tailscale health warnings on {{ inventory_hostname }}: {{ (ts_status.stdout | from_json).Health }}"
      when: (ts_status.stdout | from_json).Health | default([]) | length > 0

    # Phase 6: Configure firewall and IP forwarding
    - name: Enable IP forwarding via sysctl
      ansible.builtin.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_set: yes
        state: present
        reload: yes

    - name: Allow Tailscale UDP port through UFW
      community.general.ufw:
        rule: allow
        port: '41641'
        proto: udp
        comment: 'Tailscale overlay network'
      failed_when: false

    - name: Allow all traffic on Tailscale interface through UFW
      ansible.builtin.shell: |
        ts_iface=$(ip -o link show | grep -o 'tailscale[0-9]*' | head -1)
        if [ -n "$ts_iface" ] && command -v ufw >/dev/null 2>&1; then
          ufw allow in on "$ts_iface" comment 'Tailscale overlay - trusted network'
        fi
      changed_when: true
      failed_when: false

    - name: Display installation result
      ansible.builtin.debug:
        msg: |

          ════════════════════════════════════════════════════════
          Tailscale Installation Complete for {{ inventory_hostname }}
          ════════════════════════════════════════════════════════

          Device ID: {{ ts_device_id }}
          Tailscale IP: {{ ts_assigned_ip }}
          Hostname: {{ ts_hostname }}
          Status: Connected to tailnet

          ════════════════════════════════════════════════════════

# Final verification: test connectivity between all nodes over Tailscale.
# Peer mesh convergence is asynchronous — the coordination server has to
# push each node's endpoints to the others and direct paths get negotiated
# on demand. So retry the ping for up to ~60s instead of failing on the
# first miss.
- name: Verify Tailscale Connectivity
  hosts: overlay_nodes[0]
  gather_facts: false

  tasks:
    - name: Wait for each node to be reachable over Tailscale
      ansible.builtin.command: >
        ping -c 1 -W 3
        {{ hostvars[item]['ts_assigned_ip'] }}
      loop: "{{ groups['overlay_nodes'] }}"
      register: ts_ping_results
      changed_when: false
      until: ts_ping_results.rc == 0
      retries: 20
      delay: 3
      delegate_to: localhost
      become: false
      failed_when: false

    - name: Display connectivity results
      ansible.builtin.debug:
        msg: |

          ════════════════════════════════════════════════════════════════════════
          Tailscale Network Connectivity Verification
          ════════════════════════════════════════════════════════════════════════

          {% for result in ts_ping_results.results %}
          - {{ result.item }}: {{ hostvars[result.item]['ts_assigned_ip'] }} — {{ 'OK' if result.rc == 0 else 'UNREACHABLE' }}
          {% endfor %}

          ════════════════════════════════════════════════════════════════════════

    - name: Fail if any node is still unreachable after retries
      ansible.builtin.fail:
        msg: |
          Tailscale peer connectivity did not converge after retries. Likely causes:
            - One of the nodes can't reach controlplane.tailscale.com (check outbound HTTPS)
            - UDP 41641 blocked between nodes by an upstream firewall
            - Node still showing health warnings in `tailscale status` output above
      when: ts_ping_results.results | selectattr('rc', 'ne', 0) | list | length > 0
