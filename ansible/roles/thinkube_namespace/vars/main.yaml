---
tier_limits:
  # The LimitRange default is what every container that doesn't declare its
  # own resources gets capped at. Defaults of 2 CPU / 4Gi blew the
  # ResourceQuota for namespaces with many small containers (Harbor has 8+:
  # nginx, portal, core, jobservice, registry, database, redis, trivy —
  # 8 × 2 = 16 CPU, well past the 8 CPU quota). Containers that genuinely
  # need more should declare their own limits explicitly.
  critical:
    limit_range_default_memory: "1Gi"
    limit_range_default_cpu: "500m"
    limit_range_default_request_memory: "128Mi"
    limit_range_default_request_cpu: "50m"
    quota_requests_memory: "16Gi"
    quota_limits_memory: "32Gi"
    quota_requests_cpu: "4"
    quota_limits_cpu: "8"
  platform:
    limit_range_default_memory: "1Gi"
    limit_range_default_cpu: "500m"
    limit_range_default_request_memory: "128Mi"
    limit_range_default_request_cpu: "50m"
    quota_requests_memory: "16Gi"
    quota_limits_memory: "32Gi"
    quota_requests_cpu: "4"
    quota_limits_cpu: "8"
  workload:
    limit_range_default_memory: "256Mi"
    limit_range_default_cpu: "250m"
    limit_range_default_request_memory: "64Mi"
    limit_range_default_request_cpu: "25m"
    quota_requests_memory: "8Gi"
    quota_limits_memory: "16Gi"
    quota_requests_cpu: "4"
    quota_limits_cpu: "8"
  batch:
    limit_range_default_memory: "1Gi"
    limit_range_default_cpu: "500m"
    limit_range_default_request_memory: "256Mi"
    limit_range_default_request_cpu: "100m"
    quota_requests_memory: "16Gi"
    quota_limits_memory: "32Gi"
    quota_requests_cpu: "8"
    quota_limits_cpu: "16"
  optional:
    limit_range_default_memory: "256Mi"
    limit_range_default_cpu: "250m"
    limit_range_default_request_memory: "64Mi"
    limit_range_default_request_cpu: "25m"
    quota_requests_memory: "8Gi"
    quota_limits_memory: "16Gi"
    quota_requests_cpu: "4"
    quota_limits_cpu: "8"
