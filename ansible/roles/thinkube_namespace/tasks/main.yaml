---
# Required vars:
#   ns   - namespace name
#   tier - one of: critical, platform, workload, batch, optional

- name: Create namespace {{ ns }}
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ns }}"

- name: Apply LimitRange to {{ ns }}
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: LimitRange
      metadata:
        name: default-resources
        namespace: "{{ ns }}"
      spec:
        limits:
          - type: Container
            default:
              memory: "{{ tier_limits[tier].limit_range_default_memory }}"
              cpu: "{{ tier_limits[tier].limit_range_default_cpu }}"
            defaultRequest:
              memory: "{{ tier_limits[tier].limit_range_default_request_memory }}"
              cpu: "{{ tier_limits[tier].limit_range_default_request_cpu }}"

- name: Apply ResourceQuota to {{ ns }}
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: ResourceQuota
      metadata:
        name: resource-budget
        namespace: "{{ ns }}"
      spec:
        hard:
          requests.memory: "{{ tier_limits[tier].quota_requests_memory }}"
          limits.memory: "{{ tier_limits[tier].quota_limits_memory }}"
          requests.cpu: "{{ tier_limits[tier].quota_requests_cpu }}"
          limits.cpu: "{{ tier_limits[tier].quota_limits_cpu }}"
  when: not (skip_quota | default(false))

- name: Remove ResourceQuota from {{ ns }} (quota managed externally)
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: absent
    api_version: v1
    kind: ResourceQuota
    name: resource-budget
    namespace: "{{ ns }}"
  when: skip_quota | default(false)
