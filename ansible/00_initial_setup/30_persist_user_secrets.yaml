---
# 30_persist_user_secrets.yaml — Canonical persistence of user-supplied
# secrets onto the control-plane host.
#
# Purpose:
#   The installer machine (e.g. a Raspberry Pi running the Tauri wizard)
#   collects tokens from the user (GitHub, HuggingFace, Tailscale,
#   ZeroTier, Cloudflare, etc.) and passes them to ansible playbooks via
#   subprocess env. After the install finishes the user should be free to
#   wipe / repurpose / unplug that machine — but later operations
#   (re-runs, re-deploy, add-node from thinkube-control) still need those
#   tokens. This playbook moves them from the ephemeral subprocess env
#   onto the control-plane host's persistent ~/.env, once.
#
# This file is the canonical source/sink for these secrets. If we later
# migrate storage (k8s Secret, External Secrets + Vault, sealed-secrets,
# etc.), the migration starts here:
#   1. Replace the lineinfile loop below with the new write backend.
#   2. Replace the `lookup('env', 'KEY')` reads in playbooks (and the
#      `common/environment` role's shell-source step) with reads from
#      the same backend.
# As long as new playbooks read via the role rather than direct
# lookup('env', ...), this remains a single-chokepoint migration.
#
# Idempotent: when an env var is empty (e.g. installer is gone, or the
# user didn't enter it this run) the line in ~/.env is left untouched,
# so re-running this play never erases previously-persisted values.

- name: Persist user-supplied secrets onto the control-plane host
  hosts: k8s_control_plane
  gather_facts: false

  vars:
    env_file_path: "/home/{{ system_username }}/.env"
    user_secrets:
      - GITHUB_TOKEN
      - GITHUB_USERNAME
      - GITHUB_ORG
      - HF_TOKEN
      - CLOUDFLARE_TOKEN
      - TAILSCALE_AUTH_KEY
      - TAILSCALE_API_TOKEN
      - TAILSCALE_OAUTH_CLIENT_ID
      - TAILSCALE_OAUTH_CLIENT_SECRET
      - ZEROTIER_NETWORK_ID
      - ZEROTIER_AUTH_TOKEN

  tasks:
    - name: Ensure ~/.env exists with restrictive permissions
      ansible.builtin.file:
        path: "{{ env_file_path }}"
        state: touch
        mode: '0600'
      changed_when: false

    - name: Write user-supplied secret to ~/.env if installer provided it
      ansible.builtin.lineinfile:
        path: "{{ env_file_path }}"
        regexp: "^{{ item }}="
        line: "{{ item }}={{ lookup('env', item) }}"
        mode: '0600'
      loop: "{{ user_secrets }}"
      when: lookup('env', item) | length > 0
      no_log: true

    - name: Report which secrets are now present in ~/.env
      ansible.builtin.shell: |
        for k in {{ user_secrets | join(' ') }}; do
          if grep -q "^${k}=" "{{ env_file_path }}" && [ -n "$(grep "^${k}=" "{{ env_file_path }}" | cut -d= -f2-)" ]; then
            echo "${k}: present"
          else
            echo "${k}: missing"
          fi
        done
      register: secret_status
      changed_when: false

    - name: Show secret status
      ansible.builtin.debug:
        var: secret_status.stdout_lines
