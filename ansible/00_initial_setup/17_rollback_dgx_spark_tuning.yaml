---
# 17_rollback_dgx_spark_tuning.yaml — Remove DGX Spark host tuning
#
# Purpose:
#   Reverses 16_tune_dgx_spark.yaml. Removes the sysctl drop-in and
#   reloads sysctl so the kernel reverts to distro defaults.
#   Idempotent and safe on non-Spark nodes (drop-in absent → no-op).
#
# Run with:
#   ./scripts/run_ansible.sh ansible/00_initial_setup/17_rollback_dgx_spark_tuning.yaml

- name: Remove DGX Spark host tuning
  hosts: baremetal
  gather_facts: false
  become: true

  tasks:
    - name: Remove Thinkube DGX Spark sysctl drop-in
      ansible.builtin.file:
        path: /etc/sysctl.d/99-thinkube-dgx-spark.conf
        state: absent
      register: drop_in_removed

    - name: Reload sysctl after removing drop-in
      ansible.builtin.command: sysctl --system
      when: drop_in_removed.changed
      changed_when: true

    - name: Display result
      ansible.builtin.debug:
        msg: |

          ════════════════════════════════════════════════════════
          ✅ {{ inventory_hostname }}: DGX Spark tuning reverted
          ════════════════════════════════════════════════════════

          Drop-in removed: /etc/sysctl.d/99-thinkube-dgx-spark.conf
          Kernel restored to distribution defaults.

          ════════════════════════════════════════════════════════
      when: drop_in_removed.changed
