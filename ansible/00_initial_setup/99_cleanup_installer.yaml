---
# 99_cleanup_installer.yaml - Remove temporary installer artifacts
#
# Purpose:
#   Removes passwordless sudo that was added during SSH setup for the installer.
#   thinkube-control passes ANSIBLE_BECOME_PASSWORD via env var, so passwordless
#   sudo is not needed after installation.
#
# Run with:
#   ./scripts/tk_ansible ansible/00_initial_setup/99_cleanup_installer.yaml

- name: Cleanup Installer Artifacts
  hosts: baremetal
  become: true
  gather_facts: false

  tasks:
    - name: Remove passwordless sudo for system user
      ansible.builtin.file:
        path: "/etc/sudoers.d/{{ ansible_user }}"
        state: absent
      failed_when: false

    - name: Verify sudo still works with password
      ansible.builtin.command: whoami
      become: true
      changed_when: false
