---
# ansible/40_thinkube/core/infrastructure/gateway-api/18_test.yaml
# Validates the Cilium Gateway API deployment
#
# 🤖 [AI-assisted]

- name: Test Gateway API Deployment
  hosts: k8s_control_plane
  become: false
  gather_facts: false
  vars:
    subnet_prefix: "{{ zerotier_subnet_prefix if network_mode == 'overlay' else network_cidr.split('/')[0] | regex_replace('\\.[0-9]+$', '.') }}"
    primary_gateway_ip: "{{ subnet_prefix }}{{ primary_ingress_ip_octet }}"
    secondary_gateway_ip: "{{ subnet_prefix }}{{ secondary_ingress_ip_octet }}"
    gateway_namespace: "gateway-system"
    gateway_name: "thinkube-gateway"
    gateway_tcp_name: "thinkube-tcp-gateway"
    gateway_kn_name: "thinkube-kn-gateway"

  tasks:
    - name: Verify Gateway API CRDs are installed
      ansible.builtin.shell: |
        {{ kubectl_bin }} get crd gateways.gateway.networking.k8s.io httproutes.gateway.networking.k8s.io tcproutes.gateway.networking.k8s.io
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false

    - name: Verify GatewayClass 'cilium' exists
      ansible.builtin.shell: |
        {{ kubectl_bin }} get gatewayclass cilium -o jsonpath='{.metadata.name}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: gc_check
      changed_when: false
      failed_when: gc_check.stdout != "cilium"

    - name: Verify Cilium Gateway API is enabled
      ansible.builtin.shell: |
        {{ kubectl_bin }} get configmap cilium-config -n kube-system -o jsonpath='{.data.enable-gateway-api}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: cilium_gw_check
      changed_when: false
      failed_when: cilium_gw_check.stdout != "true"

    - name: Verify gateway-system namespace exists
      ansible.builtin.shell: |
        {{ kubectl_bin }} get namespace {{ gateway_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false

    - name: Verify Primary Gateway exists and has correct IP
      ansible.builtin.shell: |
        {{ kubectl_bin }} get gateway {{ gateway_name }} -n {{ gateway_namespace }} -o jsonpath='{.status.addresses[0].value}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: primary_ip
      changed_when: false
      failed_when: primary_ip.stdout != primary_gateway_ip

    - name: Verify TCP Gateway exists and has correct IP
      ansible.builtin.shell: |
        {{ kubectl_bin }} get gateway {{ gateway_tcp_name }} -n {{ gateway_namespace }} -o jsonpath='{.status.addresses[0].value}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: tcp_ip
      changed_when: false
      failed_when: tcp_ip.stdout != primary_gateway_ip

    - name: Verify Knative Gateway exists and has correct IP
      ansible.builtin.shell: |
        {{ kubectl_bin }} get gateway {{ gateway_kn_name }} -n {{ gateway_namespace }} -o jsonpath='{.status.addresses[0].value}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: kn_ip
      changed_when: false
      failed_when: kn_ip.stdout != secondary_gateway_ip

    - name: Verify TLS secrets exist in gateway-system
      ansible.builtin.shell: |
        {{ kubectl_bin }} get secret {{ item }} -n {{ gateway_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      loop:
        - gateway-tls-secret
        - gateway-kn-tls-secret
      changed_when: false

    - name: Verify TCPRoutes exist
      ansible.builtin.shell: |
        {{ kubectl_bin }} get tcproute -n {{ gateway_namespace }} --no-headers | wc -l
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: tcproute_count
      changed_when: false
      failed_when: tcproute_count.stdout | int < 5

    - name: Verify Primary Gateway listeners are accepted
      ansible.builtin.shell: |
        {{ kubectl_bin }} get gateway {{ gateway_name }} -n {{ gateway_namespace }} \
          -o jsonpath='{range .status.listeners[*]}{.name}={.conditions[?(@.type=="Accepted")].status}{"\n"}{end}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: listener_status
      changed_when: false

    - name: Display test results
      ansible.builtin.debug:
        msg:
          - "Gateway API tests passed"
          - "Primary Gateway: {{ primary_gateway_ip }} ({{ gateway_name }})"
          - "TCP Gateway: {{ primary_gateway_ip }} ({{ gateway_tcp_name }})"
          - "Knative Gateway: {{ secondary_gateway_ip }} ({{ gateway_kn_name }})"
          - "TCPRoutes: {{ tcproute_count.stdout | trim }}"
          - "Listener status:"
          - "{{ listener_status.stdout_lines }}"
