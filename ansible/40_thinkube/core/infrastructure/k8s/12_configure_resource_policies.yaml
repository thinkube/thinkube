---
# Configure cluster-wide resource policies for memory protection
# Description:
#   Deploys PriorityClasses, LimitRanges, and ResourceQuotas to prevent OOM crashes
#   and ensure critical services survive eviction pressure.
#
#   PriorityClasses (cluster-scoped):
#     - thinkube-critical (1000000): Gateway, DNS, CoreDNS
#     - thinkube-platform (100000): Keycloak, PostgreSQL, Harbor, Gitea, ArgoCD, thinkube-control
#     - thinkube-workload (10000): User deployments, optional components (globalDefault)
#     - thinkube-batch (1000): Argo workflow tasks, builds, one-off jobs
#
#   LimitRanges and ResourceQuotas are applied per namespace tier.
#
# Usage:
#   ./scripts/tk_ansible ansible/40_thinkube/core/infrastructure/k8s/12_configure_resource_policies.yaml

- name: Configure Cluster Resource Policies
  hosts: k8s_control_plane
  gather_facts: false

  vars:
    # Tier definitions for namespaces
    # critical: infrastructure that must never be evicted
    # platform: core platform services
    # workload: user-facing and optional components
    # batch: build and workflow jobs

    critical_namespaces:
      - "{{ gateway_namespace }}"        # gateway-system
      - dns-system
      - envoy-gateway-system

    platform_namespaces:
      - "{{ keycloak_namespace | default('keycloak') }}"
      - "{{ postgres_namespace }}"       # postgres
      - "{{ harbor_namespace }}"         # registry
      - "{{ gitea_namespace }}"          # gitea
      - "{{ argocd_namespace }}"         # argocd
      - "{{ seaweedfs_namespace }}"      # seaweedfs
      - "{{ juicefs_namespace }}"        # juicefs
      - "{{ devpi_namespace }}"          # devpi
      - "{{ thinkube_control_namespace | default('thinkube-control') }}"

    workload_namespaces:
      - "{{ code_server_namespace | default('code-server') }}"
      - "{{ jupyterhub_namespace | default('jupyterhub') }}"
      - "{{ mlflow_namespace | default('mlflow') }}"
      - "{{ monitoring_namespace }}"     # monitoring
      - "{{ qdrant_namespace }}"         # qdrant
      - "{{ langflow_namespace }}"       # langflow

    # Optional component namespaces (may not exist yet)
    optional_namespaces:
      - chroma
      - clickhouse
      - cvat
      - nats
      - ollama
      - valkey
      - weaviate
      - argilla
      - langfuse
      - litellm
      - opensearch
      - pgadmin
      - perses
      - kn

    batch_namespaces:
      - "{{ argo_namespace }}"           # argo

    # Resource limits per tier
    tier_limits:
      critical:
        limit_range_default_memory: "512Mi"
        limit_range_default_cpu: "500m"
        limit_range_default_request_memory: "128Mi"
        limit_range_default_request_cpu: "50m"
        quota_requests_memory: "16Gi"
        quota_limits_memory: "32Gi"
        quota_requests_cpu: "4"
        quota_limits_cpu: "8"
      platform:
        limit_range_default_memory: "512Mi"
        limit_range_default_cpu: "500m"
        limit_range_default_request_memory: "128Mi"
        limit_range_default_request_cpu: "50m"
        quota_requests_memory: "16Gi"
        quota_limits_memory: "32Gi"
        quota_requests_cpu: "4"
        quota_limits_cpu: "8"
      workload:
        limit_range_default_memory: "256Mi"
        limit_range_default_cpu: "250m"
        limit_range_default_request_memory: "64Mi"
        limit_range_default_request_cpu: "25m"
        quota_requests_memory: "8Gi"
        quota_limits_memory: "16Gi"
        quota_requests_cpu: "4"
        quota_limits_cpu: "8"
      optional:
        limit_range_default_memory: "256Mi"
        limit_range_default_cpu: "250m"
        limit_range_default_request_memory: "64Mi"
        limit_range_default_request_cpu: "25m"
        quota_requests_memory: "8Gi"
        quota_limits_memory: "16Gi"
        quota_requests_cpu: "4"
        quota_limits_cpu: "8"
      batch:
        limit_range_default_memory: "256Mi"
        limit_range_default_cpu: "250m"
        limit_range_default_request_memory: "64Mi"
        limit_range_default_request_cpu: "25m"
        quota_requests_memory: "8Gi"
        quota_limits_memory: "16Gi"
        quota_requests_cpu: "4"
        quota_limits_cpu: "8"

  tasks:
    # =========================================================================
    # PriorityClasses (cluster-scoped)
    # =========================================================================

    - name: Create thinkube-critical PriorityClass
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: scheduling.k8s.io/v1
          kind: PriorityClass
          metadata:
            name: thinkube-critical
          value: 1000000
          globalDefault: false
          preemptionPolicy: PreemptLowerPriority
          description: >-
            Critical infrastructure: gateway, DNS, CoreDNS.
            These pods must survive eviction pressure.

    - name: Create thinkube-platform PriorityClass
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: scheduling.k8s.io/v1
          kind: PriorityClass
          metadata:
            name: thinkube-platform
          value: 100000
          globalDefault: false
          preemptionPolicy: PreemptLowerPriority
          description: >-
            Core platform services: Keycloak, PostgreSQL, Harbor, Gitea,
            ArgoCD, thinkube-control. Evicted after batch and workloads.

    - name: Create thinkube-workload PriorityClass
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: scheduling.k8s.io/v1
          kind: PriorityClass
          metadata:
            name: thinkube-workload
          value: 10000
          globalDefault: true
          preemptionPolicy: PreemptLowerPriority
          description: >-
            Default priority for user deployments, optional components,
            and template-deployed applications.

    - name: Create thinkube-batch PriorityClass
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: scheduling.k8s.io/v1
          kind: PriorityClass
          metadata:
            name: thinkube-batch
          value: 1000
          globalDefault: false
          preemptionPolicy: PreemptLowerPriority
          description: >-
            Batch jobs: Argo workflow tasks, image builds, one-off jobs.
            First to be evicted under memory pressure.

    # =========================================================================
    # LimitRanges and ResourceQuotas per namespace tier
    # =========================================================================

    # --- Critical tier ---
    - name: Apply LimitRange to critical namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: LimitRange
          metadata:
            name: default-resources
            namespace: "{{ item }}"
          spec:
            limits:
              - type: Container
                default:
                  memory: "{{ tier_limits.critical.limit_range_default_memory }}"
                  cpu: "{{ tier_limits.critical.limit_range_default_cpu }}"
                defaultRequest:
                  memory: "{{ tier_limits.critical.limit_range_default_request_memory }}"
                  cpu: "{{ tier_limits.critical.limit_range_default_request_cpu }}"
      loop: "{{ critical_namespaces }}"
      ignore_errors: true  # Namespace may not exist yet

    - name: Apply ResourceQuota to critical namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: resource-budget
            namespace: "{{ item }}"
          spec:
            hard:
              requests.memory: "{{ tier_limits.critical.quota_requests_memory }}"
              limits.memory: "{{ tier_limits.critical.quota_limits_memory }}"
              requests.cpu: "{{ tier_limits.critical.quota_requests_cpu }}"
              limits.cpu: "{{ tier_limits.critical.quota_limits_cpu }}"
      loop: "{{ critical_namespaces }}"
      ignore_errors: true

    # --- Platform tier ---
    - name: Apply LimitRange to platform namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: LimitRange
          metadata:
            name: default-resources
            namespace: "{{ item }}"
          spec:
            limits:
              - type: Container
                default:
                  memory: "{{ tier_limits.platform.limit_range_default_memory }}"
                  cpu: "{{ tier_limits.platform.limit_range_default_cpu }}"
                defaultRequest:
                  memory: "{{ tier_limits.platform.limit_range_default_request_memory }}"
                  cpu: "{{ tier_limits.platform.limit_range_default_request_cpu }}"
      loop: "{{ platform_namespaces }}"
      ignore_errors: true

    - name: Apply ResourceQuota to platform namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: resource-budget
            namespace: "{{ item }}"
          spec:
            hard:
              requests.memory: "{{ tier_limits.platform.quota_requests_memory }}"
              limits.memory: "{{ tier_limits.platform.quota_limits_memory }}"
              requests.cpu: "{{ tier_limits.platform.quota_requests_cpu }}"
              limits.cpu: "{{ tier_limits.platform.quota_limits_cpu }}"
      loop: "{{ platform_namespaces }}"
      ignore_errors: true

    # --- Workload tier ---
    - name: Apply LimitRange to workload namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: LimitRange
          metadata:
            name: default-resources
            namespace: "{{ item }}"
          spec:
            limits:
              - type: Container
                default:
                  memory: "{{ tier_limits.workload.limit_range_default_memory }}"
                  cpu: "{{ tier_limits.workload.limit_range_default_cpu }}"
                defaultRequest:
                  memory: "{{ tier_limits.workload.limit_range_default_request_memory }}"
                  cpu: "{{ tier_limits.workload.limit_range_default_request_cpu }}"
      loop: "{{ workload_namespaces }}"
      ignore_errors: true

    - name: Apply ResourceQuota to workload namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: resource-budget
            namespace: "{{ item }}"
          spec:
            hard:
              requests.memory: "{{ tier_limits.workload.quota_requests_memory }}"
              limits.memory: "{{ tier_limits.workload.quota_limits_memory }}"
              requests.cpu: "{{ tier_limits.workload.quota_requests_cpu }}"
              limits.cpu: "{{ tier_limits.workload.quota_limits_cpu }}"
      loop: "{{ workload_namespaces }}"
      ignore_errors: true

    # --- Optional tier (namespaces may not exist) ---
    - name: Check which optional namespaces exist
      ansible.builtin.command: >
        {{ kubectl_bin }} get namespace {{ item }} --no-headers
      register: optional_ns_check
      loop: "{{ optional_namespaces }}"
      changed_when: false
      failed_when: false

    - name: Build list of existing optional namespaces
      ansible.builtin.set_fact:
        existing_optional_namespaces: >-
          {{ optional_ns_check.results
             | selectattr('rc', 'equalto', 0)
             | map(attribute='item')
             | list }}

    - name: Apply LimitRange to existing optional namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: LimitRange
          metadata:
            name: default-resources
            namespace: "{{ item }}"
          spec:
            limits:
              - type: Container
                default:
                  memory: "{{ tier_limits.optional.limit_range_default_memory }}"
                  cpu: "{{ tier_limits.optional.limit_range_default_cpu }}"
                defaultRequest:
                  memory: "{{ tier_limits.optional.limit_range_default_request_memory }}"
                  cpu: "{{ tier_limits.optional.limit_range_default_request_cpu }}"
      loop: "{{ existing_optional_namespaces }}"

    - name: Apply ResourceQuota to existing optional namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: resource-budget
            namespace: "{{ item }}"
          spec:
            hard:
              requests.memory: "{{ tier_limits.optional.quota_requests_memory }}"
              limits.memory: "{{ tier_limits.optional.quota_limits_memory }}"
              requests.cpu: "{{ tier_limits.optional.quota_requests_cpu }}"
              limits.cpu: "{{ tier_limits.optional.quota_limits_cpu }}"
      loop: "{{ existing_optional_namespaces }}"

    # --- Batch tier ---
    - name: Apply LimitRange to batch namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: LimitRange
          metadata:
            name: default-resources
            namespace: "{{ item }}"
          spec:
            limits:
              - type: Container
                default:
                  memory: "{{ tier_limits.batch.limit_range_default_memory }}"
                  cpu: "{{ tier_limits.batch.limit_range_default_cpu }}"
                defaultRequest:
                  memory: "{{ tier_limits.batch.limit_range_default_request_memory }}"
                  cpu: "{{ tier_limits.batch.limit_range_default_request_cpu }}"
      loop: "{{ batch_namespaces }}"
      ignore_errors: true

    - name: Apply ResourceQuota to batch namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: resource-budget
            namespace: "{{ item }}"
          spec:
            hard:
              requests.memory: "{{ tier_limits.batch.quota_requests_memory }}"
              limits.memory: "{{ tier_limits.batch.quota_limits_memory }}"
              requests.cpu: "{{ tier_limits.batch.quota_requests_cpu }}"
              limits.cpu: "{{ tier_limits.batch.quota_limits_cpu }}"
      loop: "{{ batch_namespaces }}"
      ignore_errors: true

    # =========================================================================
    # Summary
    # =========================================================================

    - name: Display resource policy summary
      ansible.builtin.debug:
        msg: |
          Resource policies configured:
            PriorityClasses: thinkube-critical (1M), thinkube-platform (100K),
                            thinkube-workload (10K, default), thinkube-batch (1K)
            Critical namespaces: {{ critical_namespaces | join(', ') }}
            Platform namespaces: {{ platform_namespaces | join(', ') }}
            Workload namespaces: {{ workload_namespaces | join(', ') }}
            Optional namespaces (existing): {{ existing_optional_namespaces | join(', ') }}
            Batch namespaces: {{ batch_namespaces | join(', ') }}
          Note: Template-deployed app namespaces get LimitRange/ResourceQuota
          at deployment time via the manifest generator.
