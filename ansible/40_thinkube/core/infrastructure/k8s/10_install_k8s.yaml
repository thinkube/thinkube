---
# ansible/40_thinkube/core/infrastructure/k8s/10_install_k8s.yaml
#
# Installs and configures the Thinkube Kubernetes Cluster (kubeadm) on
# the control plane node.
#
# This is the kubeadm-era replacement for the former k8s-snap install.
# It:
#   - Installs containerd.io (via containerd_install role) with the
#     Thinkube /etc/containerd/config.toml that sets SystemdCgroup=true
#     on both the legacy and the active v2 CRI plugins.
#   - Installs kubeadm/kubelet/kubectl at a pinned version (via
#     kubeadm_install role) with apt-mark hold.
#   - Bootstraps the control plane via `kubeadm init` against the stable
#     dummy interface (k8s0).
#   - Installs Cilium via helm with kube-proxy replacement, ZeroTier
#     device exclusion baked into values (no post-install ConfigMap
#     patch), and L2 announcements (ZeroTier mode only).
#   - Installs OpenEBS Rawfile CSI via helm; preserves the
#     csi-rawfile-default StorageClass and the k8s-hostpath alias.
#   - Installs vanilla upstream kubectl + helm to ~/.local/bin (unchanged
#     from the k8s-snap era — already kubeadm-clean).
#
# Requirements:
#   - Ubuntu 24.04 LTS
#   - 16 cores minimum, 64GB RAM minimum (60GB after kernel reservation), 1TB disk minimum
#   - UFW firewall enabled
#
# Variables from inventory:
#   - system_username:        User to install kubectl/helm for
#   - domain_name:            Domain name for services
#   - cluster_name:           Kubernetes cluster name
#   - overlay_provider:       'zerotier' or 'tailscale'
#   - overlay_subnet_prefix:  ZeroTier subnet prefix (ZeroTier mode only)
#   - lb_ip_start_octet:      L2 LB range start (ZeroTier mode only)
#   - lb_ip_end_octet:        L2 LB range end (ZeroTier mode only)
#
# Pinned versions are role-default values reflecting the
# v1.35.5+thinkube.0.1.0 release manifest. Phase 4 of the kubeadm
# migration will resolve them from thinkube-metadata at install time.
#
# 🤖 [AI-assisted]

- name: Install Thinkube Kubernetes Cluster (kubeadm) — Control Plane
  hosts: k8s_control_plane
  become: false
  gather_facts: true

  vars:
    user: "{{ system_username }}"
    user_home: "/home/{{ user }}"
    kubectl_wrapper_path: "{{ user_home }}/.local/bin/kubectl"
    helm_wrapper_path: "{{ user_home }}/.local/bin/helm"
    k8s_stable_ip: "172.16.0.1"  # Dummy interface IP

    # Version pins — release-manifest values for v1.35.5+thinkube.0.1.0
    kubeadm_k8s_minor: "1.35"
    kubeadm_k8s_patch: "1.35.5"
    kubeadm_k8s_apt_revision: "1.1"
    containerd_apt_version: "2.2.4-1"
    cilium_chart_repo: "https://helm.cilium.io"
    cilium_chart_version: "1.19.4"
    openebs_rawfile_chart_repo: "https://openebs.github.io/rawfile-localpv"
    openebs_rawfile_chart_version: "0.13.1"
    helm_install_version: "v3.16.4"

    # Cluster networking
    pod_cidr: "10.244.0.0/16"
    service_cidr: "10.96.0.0/12"

    # Cilium device exclusion — preserves the ZeroTier carve-out that
    # existed as a post-install ConfigMap patch in the k8s-snap era.
    cilium_devices: "k8s0 en+ eth+ wl+ bond+"

  pre_tasks:
    - name: Verify required variables exist
      ansible.builtin.fail:
        msg: "Required variable {{ item }} is not defined"
      when: vars[item] is not defined
      loop:
        - system_username
        - domain_name
        - cluster_name
        - overlay_provider

    - name: Verify ZeroTier-specific variables exist (ZeroTier mode only)
      ansible.builtin.fail:
        msg: "Required variable {{ item }} is not defined (required when overlay_provider is 'zerotier')"
      when:
        - overlay_provider == 'zerotier'
        - vars[item] is not defined
      loop:
        - overlay_subnet_prefix
        - lb_ip_start_octet
        - lb_ip_end_octet

    - name: Verify OS is Ubuntu 24.04
      ansible.builtin.fail:
        msg: "This playbook requires Ubuntu 24.04 LTS (found {{ ansible_distribution }} {{ ansible_distribution_version }})"
      when: ansible_distribution != 'Ubuntu' or ansible_distribution_version != '24.04'

    - name: Verify minimum CPU cores
      ansible.builtin.fail:
        msg: "Minimum 16 CPU cores required (found {{ ansible_processor_vcpus }})"
      when: ansible_processor_vcpus | int < 16

    - name: Verify minimum RAM
      ansible.builtin.fail:
        msg: "Minimum 64GB RAM required (threshold 60GB after kernel reservation) (found {{ (ansible_memtotal_mb / 1024) | round(1) }}GB)"
      when: (ansible_memtotal_mb / 1024) | int < 60

  tasks:
    # =====================================================================
    # Stable dummy interface (k8s0) for location-independent API endpoint
    # =====================================================================
    - name: Create systemd-networkd config directory
      ansible.builtin.file:
        path: /etc/systemd/network
        state: directory
        mode: '0755'
      become: true

    - name: Create k8s dummy interface netdev configuration
      ansible.builtin.copy:
        content: |
          [NetDev]
          Name=k8s0
          Kind=dummy
          Description=Kubernetes API Server stable interface
        dest: /etc/systemd/network/10-k8s-dummy.netdev
        mode: '0644'
      become: true
      notify: restart_networkd

    - name: Create k8s dummy interface network configuration
      ansible.builtin.copy:
        content: |
          [Match]
          Name=k8s0

          [Network]
          Address={{ k8s_stable_ip }}/32

          [Link]
          RequiredForOnline=no
        dest: /etc/systemd/network/10-k8s-dummy.network
        mode: '0644'
      become: true
      notify: restart_networkd

    - name: Enable and start systemd-networkd
      ansible.builtin.systemd:
        name: systemd-networkd
        enabled: true
        state: started
      become: true

    - name: Flush handlers to apply network config
      ansible.builtin.meta: flush_handlers

    - name: Wait for k8s dummy interface to be created
      ansible.builtin.wait_for:
        timeout: 5
      changed_when: false

    - name: Verify k8s dummy interface exists
      ansible.builtin.command: ip addr show k8s0
      become: true
      register: k8s_interface_check
      changed_when: false
      failed_when: k8s_interface_check.rc != 0

    # =====================================================================
    # UFW Firewall Configuration
    # =====================================================================
    - name: Ensure UFW is installed
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true
      become: true

    - name: Configure UFW default forward policy to ACCEPT (required for k8s networking)
      ansible.builtin.lineinfile:
        path: /etc/default/ufw
        regexp: '^DEFAULT_FORWARD_POLICY='
        line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
        backup: true
      become: true
      notify: reload_ufw

    - name: Allow SSH (22/tcp)
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp
        comment: 'SSH access'
      become: true

    - name: Allow k8s API server port (6443/tcp)
      community.general.ufw:
        rule: allow
        port: '6443'
        proto: tcp
        comment: 'k8s API server'
      become: true

    - name: Allow etcd client + peer ports (2379-2380/tcp, control plane only)
      community.general.ufw:
        rule: allow
        port: '2379:2380'
        proto: tcp
        comment: 'etcd client + peer'
      become: true

    - name: Allow controller-manager port (10257/tcp)
      community.general.ufw:
        rule: allow
        port: '10257'
        proto: tcp
        comment: 'k8s controller-manager'
      become: true

    - name: Allow scheduler port (10259/tcp)
      community.general.ufw:
        rule: allow
        port: '10259'
        proto: tcp
        comment: 'k8s scheduler'
      become: true

    - name: Allow kubelet API port (10250/tcp)
      community.general.ufw:
        rule: allow
        port: '10250'
        proto: tcp
        comment: 'k8s kubelet'
      become: true

    - name: Allow Cilium health port (4240/tcp)
      community.general.ufw:
        rule: allow
        port: '4240'
        proto: tcp
        comment: 'Cilium networking'
      become: true

    - name: Allow Cilium VXLAN port (8472/udp)
      community.general.ufw:
        rule: allow
        port: '8472'
        proto: udp
        comment: 'Cilium VXLAN'
      become: true

    - name: Allow traffic on cilium_host interface
      community.general.ufw:
        rule: allow
        interface: cilium_host
        direction: in
      become: true

    - name: Allow outbound traffic on cilium_host interface
      community.general.ufw:
        rule: allow
        interface: cilium_host
        direction: out
      become: true

    - name: Allow k8s API server traffic on dummy interface
      community.general.ufw:
        rule: allow
        interface: k8s0
        direction: in
        comment: 'k8s API server on dummy interface'
      become: true

    - name: Allow outbound traffic on k8s0 interface
      community.general.ufw:
        rule: allow
        interface: k8s0
        direction: out
      become: true

    # Workers re-resolve the control plane's hostname at boot via LLMNR.
    # Ubuntu ships systemd-resolved with LLMNR disabled, so enable the
    # responder explicitly and open its query port.
    - name: Create systemd-resolved drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: '0755'
      become: true

    - name: Enable LLMNR in systemd-resolved
      ansible.builtin.copy:
        content: |
          # Managed by Thinkube — boot-time control-plane re-resolution
          # (thinkube-node-ip-sync) uses LLMNR on the local link.
          [Resolve]
          LLMNR=yes
        dest: /etc/systemd/resolved.conf.d/10-thinkube-llmnr.conf
        mode: '0644'
      become: true
      register: _llmnr_conf

    - name: Restart systemd-resolved to apply LLMNR setting
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted
      become: true
      when: _llmnr_conf is changed

    - name: Allow LLMNR name resolution (5355/udp)
      community.general.ufw:
        rule: allow
        port: '5355'
        proto: udp
        comment: 'LLMNR name resolution'
      become: true

    # Overlay-network firewall rules. Tailscale's daemon configures its
    # own UFW rules during install (UDP/41641 and tailscale0 trust). For
    # ZeroTier we add the interface family and an SSH-from-overlay rule.
    - name: Allow all traffic on ZeroTier interfaces
      community.general.ufw:
        rule: allow
        interface: "zt+"
        direction: in
        comment: 'ZeroTier overlay'
      become: true
      when: overlay_provider == 'zerotier'

    - name: Allow outbound traffic on ZeroTier interfaces
      community.general.ufw:
        rule: allow
        interface: "zt+"
        direction: out
        comment: 'ZeroTier overlay'
      become: true
      when: overlay_provider == 'zerotier'

    - name: Allow SSH from ZeroTier subnet
      community.general.ufw:
        rule: allow
        src: "{{ overlay_subnet_prefix }}0/24"
        port: '22'
        proto: tcp
        comment: 'SSH from ZeroTier'
      become: true
      when: overlay_provider == 'zerotier'

    - name: Enable UFW
      community.general.ufw:
        state: enabled
      become: true

    # =====================================================================
    # Boot-time node-ip self-healing
    # =====================================================================
    # The stable VIP keeps every cluster-internal reference
    # network-independent; kubelet's --node-ip is the one value tied to
    # the current network. This oneshot rewrites it at every boot from
    # the default route, so moving the machine to another network is just
    # "plug in and boot" — no playbook needed (none could run anyway with
    # the cluster down).
    - name: Install node-ip sync script
      ansible.builtin.template:
        src: thinkube-node-ip-sync.sh.j2
        dest: /usr/local/bin/thinkube-node-ip-sync
        mode: '0755'
      vars:
        node_ip_sync_managed_by: 10_install_k8s.yaml
      become: true

    - name: Install node-ip sync unit
      ansible.builtin.copy:
        src: thinkube-node-ip-sync.service
        dest: /etc/systemd/system/thinkube-node-ip-sync.service
        mode: '0644'
      become: true

    - name: Enable node-ip sync at boot
      ansible.builtin.systemd:
        name: thinkube-node-ip-sync.service
        enabled: true
        daemon_reload: true
      become: true

    # =====================================================================
    # containerd + kubeadm/kubelet/kubectl install (via roles)
    # =====================================================================
    - name: Install containerd.io with Thinkube config
      ansible.builtin.import_role:
        name: containerd_install

    - name: Install kubeadm + kubelet + kubectl
      ansible.builtin.import_role:
        name: kubeadm_install

    # =====================================================================
    # kubeadm init — bootstrap the control plane
    # =====================================================================
    - name: Check if cluster is already initialised
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: _admin_conf

    - name: Render kubeadm config
      ansible.builtin.template:
        src: kubeadm-init-config.yaml.j2
        dest: /tmp/kubeadm-config.yaml
        mode: '0600'
      become: true
      when: not _admin_conf.stat.exists

    - name: Pre-pull kubeadm images
      ansible.builtin.command: kubeadm config images pull --config /tmp/kubeadm-config.yaml
      become: true
      when: not _admin_conf.stat.exists
      register: _kubeadm_pull
      changed_when: _kubeadm_pull.rc == 0

    # Flags:
    # --upload-certs uploads the cluster CA + service account keys to a
    #   kubeadm-managed Secret. NOT an HA enabler by itself: real HA
    #   requires controlPlaneEndpoint to be a VIP/DNS name that fronts
    #   multiple API servers. Today's endpoint is the single-node stable
    #   IP (k8s_stable_ip:6443), so this is single-CP. --upload-certs is
    #   harmless here and saves a step IF a future HA migration adopts a
    #   real load-balanced controlPlaneEndpoint.
    # --skip-phases=addon/kube-proxy because Cilium runs with
    #   kubeProxyReplacement=true; letting kubeadm install kube-proxy
    #   would create two competing dataplanes fighting over service
    #   routing. Critical flag.
    - name: Run kubeadm init
      ansible.builtin.command: kubeadm init --config /tmp/kubeadm-config.yaml --upload-certs --skip-phases=addon/kube-proxy
      become: true
      when: not _admin_conf.stat.exists
      register: _kubeadm_init
      changed_when: _kubeadm_init.rc == 0

    - name: Display kubeadm init output (truncated)
      ansible.builtin.debug:
        msg: "{{ _kubeadm_init.stdout_lines[-40:] }}"
      when: _kubeadm_init is changed

    - name: Remove ephemeral kubeadm config (contains certificate key)
      ansible.builtin.file:
        path: /tmp/kubeadm-config.yaml
        state: absent
      become: true

    # =====================================================================
    # kubeconfig for the user
    # =====================================================================
    - name: Create .kube directory for the user
      ansible.builtin.file:
        path: "{{ user_home }}/.kube"
        state: directory
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: '0755'
      become: true

    - name: Copy admin.conf as the user's kubeconfig
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: "{{ user_home }}/.kube/config"
        remote_src: true
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: '0600'
      become: true

    - name: Verify kubeconfig points at the stable API endpoint
      ansible.builtin.shell: |
        grep -q "server: https://{{ k8s_stable_ip }}:6443" "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      changed_when: false

    # Thinkube runs platform workloads (code-server, thinkube-control,
    # JupyterHub) on the control plane by design — they share the host-
    # path volume. kubeadm's default NoSchedule taint must be removed
    # unconditionally, not just for single-node clusters.
    - name: Remove control-plane NoSchedule taint
      ansible.builtin.command: >
        kubectl taint nodes --all node-role.kubernetes.io/control-plane- --overwrite
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      register: _taint_remove
      changed_when: "'untainted' in _taint_remove.stdout"

    # =====================================================================
    # Install vanilla upstream kubectl + helm to ~/.local/bin
    # (Kept verbatim from the k8s-snap era — already kubeadm-clean.)
    # =====================================================================
    - name: Create .local/bin directory for user
      ansible.builtin.file:
        path: "{{ user_home }}/.local/bin"
        state: directory
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: '0755'
      become_user: "{{ user }}"

    - name: Detect system architecture
      ansible.builtin.set_fact:
        system_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

    - name: Download kubectl binary
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/v{{ kubeadm_k8s_patch }}/bin/linux/{{ system_arch }}/kubectl"
        dest: "{{ kubectl_wrapper_path }}"
        mode: '0755'
        owner: "{{ user }}"
        group: "{{ user }}"
      become_user: "{{ user }}"
      register: _kubectl_download
      retries: 5
      delay: 10
      until: _kubectl_download is succeeded

    - name: Download helm installer
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3"
        dest: "/tmp/get-helm-3.sh"
        mode: '0755'
        force: true
      become: true

    - name: Install helm binary
      ansible.builtin.shell: |
        export HELM_INSTALL_DIR="{{ user_home }}/.local/bin"
        export USE_SUDO=false
        export DESIRED_VERSION="{{ helm_install_version }}"
        /tmp/get-helm-3.sh
      args:
        creates: "{{ helm_wrapper_path }}"
      environment:
        PATH: "{{ user_home }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      become_user: "{{ user }}"
      register: _helm_install
      retries: 5
      delay: 10
      until: _helm_install.rc == 0

    - name: Set helm binary ownership
      ansible.builtin.file:
        path: "{{ helm_wrapper_path }}"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: '0755'
      become: true

    # =====================================================================
    # Install Cilium via helm (kube-proxy replacement + ZeroTier exclusion)
    # =====================================================================
    - name: Add Cilium helm repository
      ansible.builtin.command: "{{ helm_wrapper_path }} repo add cilium {{ cilium_chart_repo }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      register: _cilium_repo_add
      changed_when: "'already exists' not in _cilium_repo_add.stderr"
      failed_when: _cilium_repo_add.rc != 0 and 'already exists' not in _cilium_repo_add.stderr

    - name: Update helm repos
      ansible.builtin.command: "{{ helm_wrapper_path }} repo update"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      changed_when: false

    - name: Render Cilium values file
      ansible.builtin.template:
        src: cilium-values.yaml.j2
        dest: "/tmp/cilium-values.yaml"
        mode: '0644'
      become_user: "{{ user }}"

    - name: Install / upgrade Cilium
      ansible.builtin.command: >
        {{ helm_wrapper_path }} upgrade --install cilium cilium/cilium
        --version {{ cilium_chart_version }}
        --namespace kube-system
        --values /tmp/cilium-values.yaml
        --wait
        --timeout 10m
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      register: _cilium_install
      changed_when: "'has been upgraded' in _cilium_install.stdout or 'STATUS: deployed' in _cilium_install.stdout"

    - name: Wait for Cilium DaemonSet to be ready
      ansible.builtin.command: "{{ kubectl_wrapper_path }} rollout status daemonset/cilium -n kube-system --timeout=300s"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      changed_when: false

    - name: Wait for CoreDNS to be ready
      ansible.builtin.command: "{{ kubectl_wrapper_path }} rollout status deployment/coredns -n kube-system --timeout=300s"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      changed_when: false

    # =====================================================================
    # Cilium L2 Load Balancer (ZeroTier mode only)
    # =====================================================================
    # Replaces `k8s enable load-balancer` + `k8s set load-balancer.cidrs=...`.
    # Tailscale mode skips entirely — the Tailscale Operator handles
    # Service exposure via per-Service tailnet IPs.
    - name: Build Cilium load balancer IP range
      ansible.builtin.set_fact:
        lb_ip_range_start: "{{ overlay_subnet_prefix }}{{ lb_ip_start_octet }}"
        lb_ip_range_end: "{{ overlay_subnet_prefix }}{{ lb_ip_end_octet }}"
      when: overlay_provider == 'zerotier'

    - name: Render Cilium L2 LB pool + announcement manifests
      ansible.builtin.template:
        src: cilium-l2-lb.yaml.j2
        dest: /tmp/cilium-l2-lb.yaml
        mode: '0644'
      become_user: "{{ user }}"
      when: overlay_provider == 'zerotier'

    - name: Apply Cilium L2 LB resources
      ansible.builtin.command: "{{ kubectl_wrapper_path }} apply -f /tmp/cilium-l2-lb.yaml"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      when: overlay_provider == 'zerotier'
      register: _lb_apply
      changed_when: "'created' in _lb_apply.stdout or 'configured' in _lb_apply.stdout"

    - name: Skip Cilium L2 LB (Tailscale mode)
      ansible.builtin.debug:
        msg: >-
          overlay_provider is 'tailscale' — Cilium L2 announcements
          disabled. The Tailscale Operator provisions tailnet IPs for
          annotated Services.
      when: overlay_provider == 'tailscale'

    # =====================================================================
    # Install OpenEBS Rawfile CSI via helm
    # =====================================================================
    - name: Add OpenEBS Rawfile helm repository
      ansible.builtin.command: "{{ helm_wrapper_path }} repo add openebs-rawfile {{ openebs_rawfile_chart_repo }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      register: _rawfile_repo_add
      changed_when: "'already exists' not in _rawfile_repo_add.stderr"
      failed_when: _rawfile_repo_add.rc != 0 and 'already exists' not in _rawfile_repo_add.stderr

    - name: Update helm repos (after adding rawfile)
      ansible.builtin.command: "{{ helm_wrapper_path }} repo update"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      changed_when: false

    - name: Install / upgrade OpenEBS Rawfile CSI
      ansible.builtin.command: >
        {{ helm_wrapper_path }} upgrade --install rawfile-csi openebs-rawfile/rawfile-localpv
        --version {{ openebs_rawfile_chart_version }}
        --namespace kube-system
        --wait
        --timeout 10m
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      register: _rawfile_install
      changed_when: "'has been upgraded' in _rawfile_install.stdout or 'STATUS: deployed' in _rawfile_install.stdout"

    - name: Wait for rawfile-csi node DaemonSet to be ready
      ansible.builtin.shell: |
        {{ kubectl_wrapper_path }} rollout status daemonset -l app.kubernetes.io/name=rawfile-csi -n kube-system --timeout=300s 2>/dev/null \
          || {{ kubectl_wrapper_path }} rollout status daemonset -l app=rawfile-csi-node -n kube-system --timeout=300s
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      changed_when: false

    - name: Apply k8s-hostpath StorageClass (alias for csi-rawfile-default)
      ansible.builtin.copy:
        src: files/k8s-hostpath-storageclass.yaml
        dest: /tmp/k8s-hostpath-storageclass.yaml
        mode: '0644'
      become_user: "{{ user }}"

    - name: Apply k8s-hostpath StorageClass
      ansible.builtin.command: "{{ kubectl_wrapper_path }} apply -f /tmp/k8s-hostpath-storageclass.yaml"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      register: _storageclass_apply
      changed_when: "'created' in _storageclass_apply.stdout or 'configured' in _storageclass_apply.stdout"

    - name: Verify both storage classes are present
      ansible.builtin.shell: |
        {{ kubectl_wrapper_path }} get storageclass | grep -E '^(k8s-hostpath|csi-rawfile-default) '
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      changed_when: false

    # =====================================================================
    # Wait for control plane node to be Ready
    # =====================================================================
    - name: Wait for control plane node to become Ready
      ansible.builtin.command: >
        {{ kubectl_wrapper_path }} wait --for=condition=Ready node/{{ inventory_hostname }} --timeout=300s
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      changed_when: false

    - name: Get final node status
      ansible.builtin.command: "{{ kubectl_wrapper_path }} get nodes -o wide"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      become_user: "{{ user }}"
      register: nodes_status
      changed_when: false

    - name: Display node status
      ansible.builtin.debug:
        var: nodes_status.stdout_lines

    # =====================================================================
    # Shell aliases for kubectl + helm (unchanged from k8s-snap era)
    # =====================================================================
    - name: Check if .thinkube_shared_shell exists
      ansible.builtin.stat:
        path: "{{ user_home }}/.thinkube_shared_shell"
      register: shared_shell_dir

    - name: Integrate kubectl aliases into thinkube_shared_shell
      when: shared_shell_dir.stat.exists
      block:
        - name: Ensure aliases directory exists
          ansible.builtin.file:
            path: "{{ user_home }}/.thinkube_shared_shell/aliases"
            state: directory
            owner: "{{ user }}"
            group: "{{ user }}"
            mode: '0755'

        - name: Create kubectl aliases shell script for bash/zsh
          ansible.builtin.copy:
            content: |
              #!/bin/bash
              # kubectl + helm aliases
              alias k='kubectl'
              alias kg='kubectl get'
              alias kd='kubectl describe'
              alias kdel='kubectl delete'
              alias kl='kubectl logs'
              alias ke='kubectl edit'
              alias kex='kubectl exec -it'
              alias kgp='kubectl get pods'
              alias kgn='kubectl get nodes'
              alias kgs='kubectl get svc'
              alias kgd='kubectl get deployments'
              alias kga='kubectl get all'
              alias kgpa='kubectl get pods -A'
              alias kgna='kubectl get nodes -o wide'
              alias kaf='kubectl apply -f'
              alias kdf='kubectl delete -f'

              alias h='helm'
              alias hl='helm list'
              alias hla='helm list -A'
              alias hi='helm install'
              alias hu='helm upgrade'
              alias hd='helm delete'
              alias hs='helm status'
              alias hh='helm history'
            dest: "{{ user_home }}/.thinkube_shared_shell/aliases/k8s_aliases.sh"
            owner: "{{ user }}"
            group: "{{ user }}"
            mode: '0644'

        - name: Create k8s aliases for fish shell
          ansible.builtin.copy:
            content: |
              # kubectl + helm abbreviations for fish
              abbr -a k kubectl
              abbr -a kg kubectl get
              abbr -a kd kubectl describe
              abbr -a kdel kubectl delete
              abbr -a kl kubectl logs
              abbr -a ke kubectl edit
              abbr -a kex kubectl exec -it
              abbr -a kgp kubectl get pods
              abbr -a kgn kubectl get nodes
              abbr -a kgs kubectl get svc
              abbr -a kgd kubectl get deployments
              abbr -a kga kubectl get all
              abbr -a kgpa kubectl get pods -A
              abbr -a kgna kubectl get nodes -o wide
              abbr -a kaf kubectl apply -f
              abbr -a kdf kubectl delete -f

              abbr -a h helm
              abbr -a hl helm list
              abbr -a hla helm list -A
              abbr -a hi helm install
              abbr -a hu helm upgrade
              abbr -a hd helm delete
              abbr -a hs helm status
              abbr -a hh helm history
            dest: "{{ user_home }}/.thinkube_shared_shell/aliases/k8s_aliases.fish"
            owner: "{{ user }}"
            group: "{{ user }}"
            mode: '0644'

  handlers:
    - name: reload_ufw
      ansible.builtin.shell: |
        ufw disable
        ufw --force enable
      become: true
      listen: reload_ufw
      changed_when: true

    - name: restart_networkd
      ansible.builtin.systemd:
        name: systemd-networkd
        state: restarted
      become: true
      listen: restart_networkd

  post_tasks:
    - name: Display installation summary
      ansible.builtin.debug:
        msg:
          - "==============================================="
          - "Thinkube Kubernetes Cluster (kubeadm) Installed"
          - "==============================================="
          - "Version: v{{ kubeadm_k8s_patch }} + Thinkube"
          - "API Server: https://{{ k8s_stable_ip }}:6443 (stable interface k8s0)"
          - "Cluster Name: {{ cluster_name }}"
          - "containerd: {{ containerd_apt_version }}"
          - "Cilium: {{ cilium_chart_version }} (kube-proxy replacement, ZeroTier-excluded devices)"
          - "OpenEBS Rawfile CSI: {{ openebs_rawfile_chart_version }}"
          - "Storage Classes: csi-rawfile-default, k8s-hostpath"
          - "kubectl: {{ kubectl_wrapper_path }} (vanilla upstream, no sudo)"
          - "helm:    {{ helm_wrapper_path }}  (vanilla upstream, no sudo)"
          - "==============================================="
          - "Overlay mode: {{ overlay_provider }}"
          - "{{ 'L2 LB range: ' + lb_ip_range_start + ' - ' + lb_ip_range_end if overlay_provider == 'zerotier' else 'L2 LB disabled — Tailscale Operator handles Service exposure' }}"
          - "==============================================="
          - "Next Steps:"
          - "1. Join workers:     ansible/40_thinkube/core/infrastructure/k8s/20_join_workers.yaml"
          - "2. GPU Operator:     ansible/40_thinkube/core/infrastructure/gpu_operator/00_install.yaml"
          - "3. Gateway API:      ansible/40_thinkube/core/infrastructure/gateway-api/10_deploy.yaml"
          - "==============================================="
