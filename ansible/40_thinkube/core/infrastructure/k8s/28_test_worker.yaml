---
# Test playbook for kubeadm worker nodes
# Description:
#   Verifies worker node installation and cluster membership
#   Tests include:
#   - kubeadm/kubelet installation and kubelet health
#   - Node-local API VIP (k8s0 dummy + socket proxy) end-to-end
#   - Node presence in cluster, Ready status, InternalIP = lan_ip
#   - kubelet.conf pinned to the stable VIP endpoint
#   - Cilium agent running on the worker
#   - Pod scheduling on worker + in-cluster API access from a worker pod
#     (the pod → ClusterIP → VIP → local proxy path)
#
# Usage:
#   ./scripts/tk_ansible ansible/40_thinkube/core/infrastructure/k8s/28_test_worker.yaml
#
# 🤖 [AI-assisted]

- name: Test kubeadm Worker Nodes
  hosts: k8s_workers
  gather_facts: true

  vars:
    user: "{{ system_username }}"
    user_home: "/home/{{ user }}"
    control_plane_host: "{{ groups['k8s_control_plane'][0] }}"
    control_plane_kubectl: "/home/{{ system_username }}/.local/bin/kubectl"
    k8s_stable_ip: "172.16.0.1"

  tasks:
    - name: Check kubelet service is active
      ansible.builtin.command: systemctl is-active kubelet
      register: kubelet_active
      changed_when: false
      failed_when: kubelet_active.stdout != 'active'
      become: true

    - name: Check kubeadm is installed
      ansible.builtin.command: kubeadm version -o short
      register: kubeadm_version
      changed_when: false
      failed_when: kubeadm_version.rc != 0

    - name: Verify kubectl wrapper exists
      ansible.builtin.stat:
        path: "{{ user_home }}/.local/bin/kubectl"
      register: kubectl_wrapper
      failed_when: not kubectl_wrapper.stat.exists

    - name: Verify helm wrapper exists
      ansible.builtin.stat:
        path: "{{ user_home }}/.local/bin/helm"
      register: helm_wrapper
      failed_when: not helm_wrapper.stat.exists

    # =====================================================================
    # Node-local API VIP (k8s0 dummy + socket proxy)
    # =====================================================================
    - name: Check k8s0 dummy interface carries the stable IP
      ansible.builtin.command: ip addr show k8s0
      register: k8s0_check
      changed_when: false
      failed_when: k8s_stable_ip not in k8s0_check.stdout
      become: true

    - name: Check API VIP proxy socket is active
      ansible.builtin.command: systemctl is-active k8s-api-proxy.socket
      register: proxy_socket_active
      changed_when: false
      failed_when: proxy_socket_active.stdout != 'active'
      become: true

    - name: Verify API server reachable through the node-local VIP
      ansible.builtin.command: >
        curl -ks --max-time 10 https://{{ k8s_stable_ip }}:6443/version
      register: vip_api_check
      changed_when: false
      failed_when: "'gitVersion' not in vip_api_check.stdout"

    - name: Check kubelet.conf points at the stable VIP endpoint
      ansible.builtin.command: grep 'server:' /etc/kubernetes/kubelet.conf
      register: kubelet_conf_server
      changed_when: false
      failed_when: "('https://' + k8s_stable_ip + ':6443') not in kubelet_conf_server.stdout"
      become: true

    # =====================================================================
    # Cluster membership (checked from the control plane)
    # =====================================================================
    - name: Check worker node status in cluster
      ansible.builtin.command: >
        {{ control_plane_kubectl }} get node {{ inventory_hostname }}
        -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      delegate_to: "{{ control_plane_host }}"
      environment:
        KUBECONFIG: "/home/{{ system_username }}/.kube/config"
      become_user: "{{ system_username }}"
      register: node_ready_status
      changed_when: false

    - name: Verify worker node is Ready
      ansible.builtin.assert:
        that:
          - node_ready_status.stdout == 'True'
        fail_msg: "Worker node {{ inventory_hostname }} is not Ready"
        success_msg: "Worker node {{ inventory_hostname }} is Ready"

    - name: Check worker node InternalIP
      ansible.builtin.command: >
        {{ control_plane_kubectl }} get node {{ inventory_hostname }}
        -o jsonpath='{.status.addresses[?(@.type=="InternalIP")].address}'
      delegate_to: "{{ control_plane_host }}"
      environment:
        KUBECONFIG: "/home/{{ system_username }}/.kube/config"
      become_user: "{{ system_username }}"
      register: node_internal_ip
      changed_when: false

    - name: Verify InternalIP is the worker's real LAN IP (not the VIP)
      ansible.builtin.assert:
        that:
          - node_internal_ip.stdout == lan_ip
        fail_msg: >-
          Worker {{ inventory_hostname }} InternalIP is
          {{ node_internal_ip.stdout }}, expected {{ lan_ip }} — Cilium VXLAN
          and apiserver→kubelet traffic target this address directly.
        success_msg: "Worker InternalIP correctly set to {{ lan_ip }}"

    - name: Check Cilium agent on worker
      ansible.builtin.command: >
        {{ control_plane_kubectl }} get pods -n kube-system -l k8s-app=cilium
        --field-selector spec.nodeName={{ inventory_hostname }}
      delegate_to: "{{ control_plane_host }}"
      environment:
        KUBECONFIG: "/home/{{ system_username }}/.kube/config"
      become_user: "{{ system_username }}"
      register: cilium_on_worker
      changed_when: false

    - name: Verify Cilium is running on worker
      ansible.builtin.assert:
        that:
          - "'Running' in cilium_on_worker.stdout"
        fail_msg: "Cilium is not running on worker {{ inventory_hostname }}"
        success_msg: "Cilium is running on worker {{ inventory_hostname }}"

    - name: Verify UFW forward policy is ACCEPT
      ansible.builtin.command: grep '^DEFAULT_FORWARD_POLICY=' /etc/default/ufw
      register: ufw_forward_policy
      changed_when: false
      failed_when: "'ACCEPT' not in ufw_forward_policy.stdout"
      become: true

    - name: Display worker test summary
      ansible.builtin.debug:
        msg:
          - "==============================================="
          - "Worker Node Test Results: {{ inventory_hostname }}"
          - "==============================================="
          - "kubelet Active: PASS"
          - "kubeadm Installed: PASS ({{ kubeadm_version.stdout }})"
          - "k8s0 VIP Interface: PASS"
          - "API via VIP Proxy: PASS"
          - "kubelet.conf on VIP: PASS"
          - "Node Ready: PASS"
          - "InternalIP = lan_ip: PASS ({{ lan_ip }})"
          - "Cilium Running: PASS"
          - "UFW Forward Policy: PASS"
          - "==============================================="

- name: Test Pod Scheduling on Workers
  hosts: k8s_control_plane
  become: false
  gather_facts: false

  vars:
    test_namespace: "worker-test"
    kubectl_bin: "/home/{{ system_username }}/.local/bin/kubectl"
    kubeconfig_path: "/home/{{ system_username }}/.kube/config"

  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Create test namespace
      ansible.builtin.command: "{{ kubectl_bin }} create namespace {{ test_namespace }}"
      become_user: "{{ system_username }}"
      register: ns_create
      changed_when: "'created' in ns_create.stdout"
      failed_when:
        - ns_create.rc != 0
        - "'already exists' not in ns_create.stderr"

    - name: Create test deployment for each worker
      ansible.builtin.shell: |
        {{ kubectl_bin }} apply -f - <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: test-{{ item }}
          namespace: {{ test_namespace }}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: test-{{ item }}
          template:
            metadata:
              labels:
                app: test-{{ item }}
            spec:
              nodeSelector:
                kubernetes.io/hostname: {{ item }}
              containers:
              - name: nginx
                image: nginx:1.27-alpine
                ports:
                - containerPort: 80
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "100m"
                  limits:
                    memory: "128Mi"
                    cpu: "200m"
        EOF
      become_user: "{{ system_username }}"
      loop: "{{ groups['k8s_workers'] }}"
      register: deployment_create
      changed_when: "'created' in deployment_create.stdout or 'configured' in deployment_create.stdout"

    - name: Wait for test pods to be running
      ansible.builtin.command: >
        {{ kubectl_bin }} wait --for=condition=ready pod -l app=test-{{ item }}
        -n {{ test_namespace }} --timeout=120s
      become_user: "{{ system_username }}"
      loop: "{{ groups['k8s_workers'] }}"
      register: pod_ready
      retries: 3
      delay: 10
      until: pod_ready.rc == 0
      changed_when: false

    # The riskiest path of the node-local VIP architecture: a pod on the
    # worker dials the kubernetes ClusterIP, Cilium DNATs it to the
    # Endpoints IP (the VIP), and the worker's local proxy carries it to
    # the control plane. If this fails, see the fallback note in
    # 20_join_workers.yaml (advertise-address).
    - name: Verify in-cluster API access from each worker pod
      ansible.builtin.command: >
        {{ kubectl_bin }} exec -n {{ test_namespace }} deploy/test-{{ item }} --
        sh -c 'wget -qO- --no-check-certificate
        https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT/version'
      become_user: "{{ system_username }}"
      loop: "{{ groups['k8s_workers'] }}"
      register: incluster_api_check
      changed_when: false
      failed_when: "'gitVersion' not in incluster_api_check.stdout"

    - name: Verify test pods are running on correct workers
      ansible.builtin.shell: |
        pod_count=$({{ kubectl_bin }} get pods -n {{ test_namespace }} --field-selector spec.nodeName={{ item }},status.phase=Running --no-headers | wc -l)
        if [ "$pod_count" -ge 1 ]; then
          echo "PASS: Test pod running on {{ item }}"
          exit 0
        else
          echo "FAIL: No test pod running on {{ item }}"
          exit 1
        fi
      become_user: "{{ system_username }}"
      loop: "{{ groups['k8s_workers'] }}"
      register: pod_verification
      changed_when: false

    - name: Display pod scheduling verification
      ansible.builtin.debug:
        msg: "{{ item.stdout }}"
      loop: "{{ pod_verification.results }}"

    - name: Clean up test namespace
      ansible.builtin.command: "{{ kubectl_bin }} delete namespace {{ test_namespace }}"
      become_user: "{{ system_username }}"
      register: ns_delete
      changed_when: "'deleted' in ns_delete.stdout"
      failed_when: false

    - name: Display final summary
      ansible.builtin.debug:
        msg:
          - "==============================================="
          - "Worker Node Testing Complete"
          - "==============================================="
          - "All workers successfully tested:"
          - "  - Workers are in cluster and Ready"
          - "  - Node-local API VIP proxy working end-to-end"
          - "  - InternalIPs are real LAN IPs"
          - "  - Cilium CNI running on all workers"
          - "  - Pods scheduled on workers reach the in-cluster API"
          - "==============================================="
