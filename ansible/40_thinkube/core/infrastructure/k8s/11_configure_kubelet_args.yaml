---
# 11_configure_kubelet_args.yaml - Apply correct kubelet resource protection args
#
# Purpose:
#   Ensures all k8s-snap nodes have the correct kubelet memory reservation and
#   eviction settings. Safe to re-run on any node at any time.
#
#   enforce-node-allocatable is intentionally set to "pods" only.
#   system-reserved and kube-reserved inform the scheduler (reducing advertised
#   allocatable) but are NOT enforced via cgroups. k8s-snap runs all system
#   daemons under system.slice alongside OS services, so setting hard cgroup
#   limits on those slices causes memory pressure even on nodes with abundant
#   RAM. Pod-level cgroup enforcement (kubepods.slice) is sufficient.
#
# Usage:
#   ansible-playbook -i inventory/inventory.yaml \
#     ansible/40_thinkube/core/infrastructure/k8s/11_configure_kubelet_args.yaml

- name: Configure kubelet resource protection args on all k8s nodes
  hosts: k8s_control_plane:k8s_workers
  become: true
  gather_facts: false

  vars:
    kubelet_args_file: /var/snap/k8s/common/args/kubelet

    kubelet_args:
      - regexp: '--system-reserved='
        line:   '--system-reserved="memory=4Gi,cpu=500m"'
      - regexp: '--kube-reserved='
        line:   '--kube-reserved="memory=2Gi,cpu=500m"'
      - regexp: '--eviction-hard='
        line:   '--eviction-hard="memory.available<2Gi,nodefs.available<10%"'
      - regexp: '--eviction-soft='
        line:   '--eviction-soft="memory.available<4Gi,nodefs.available<15%"'
      - regexp: '--eviction-soft-grace-period='
        line:   '--eviction-soft-grace-period="memory.available=30s,nodefs.available=1m"'
      - regexp: '--enforce-node-allocatable='
        line:   '--enforce-node-allocatable="pods"'

    stale_args:
      - '--system-reserved-cgroup='
      - '--kube-reserved-cgroup='

  tasks:
    - name: Set correct kubelet resource args
      ansible.builtin.lineinfile:
        path: "{{ kubelet_args_file }}"
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop: "{{ kubelet_args }}"
      register: kubelet_args_result

    - name: Remove stale cgroup path args
      ansible.builtin.lineinfile:
        path: "{{ kubelet_args_file }}"
        regexp: "{{ item }}"
        state: absent
      loop: "{{ stale_args }}"
      register: kubelet_stale_result

    - name: Restart k8s snap to apply changes
      ansible.builtin.command: snap restart k8s
      when: kubelet_args_result is changed or kubelet_stale_result is changed

    - name: Wait for k8s to be ready after restart
      ansible.builtin.command: k8s status --wait-ready
      register: k8s_ready
      retries: 20
      delay: 10
      until: k8s_ready.rc == 0
      changed_when: false
      when: kubelet_args_result is changed or kubelet_stale_result is changed
