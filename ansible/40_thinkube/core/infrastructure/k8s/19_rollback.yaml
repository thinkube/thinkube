---
# ansible/40_thinkube/core/infrastructure/k8s/19_rollback.yaml
# Description:
#   Full cluster teardown: deletes all PVCs/PVs, removes k8s snap, and cleans
#   up leftover rawfile loop devices. Run this before reinstalling from scratch.
#
# Requirements:
#   - k8s-snap cluster must be running (kubectl must work)
#
# Usage:
#   cd ~/thinkube
#   ./scripts/tk_ansible ansible/40_thinkube/core/infrastructure/k8s/19_rollback.yaml
#
# Variables from inventory:
#   - kubectl_bin: Path to kubectl binary
#   - kubeconfig: Path to Kubernetes configuration

- name: Full k8s cluster teardown and cleanup
  hosts: k8s_control_plane
  become: false
  gather_facts: false

  tasks:
    ###########################################################################
    # 1) Delete all PVCs across all namespaces
    ###########################################################################
    - name: Get all PVCs across all namespaces
      ansible.builtin.shell: |
        {{ kubectl_bin }} get pvc -A -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: all_pvcs
      changed_when: false
      failed_when: false

    - name: Delete all PVCs
      ansible.builtin.shell: |
        {{ kubectl_bin }} delete pvc -n {{ item.split()[0] }} {{ item.split()[1] }} --wait=false --ignore-not-found=true
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      loop: "{{ all_pvcs.stdout_lines | select('match', '.+') | list }}"
      when: all_pvcs.stdout_lines | length > 0
      register: pvc_delete
      changed_when: "'deleted' in pvc_delete.stdout"
      failed_when: false

    ###########################################################################
    # 2) Force-remove all PVs (including Retain-policy ones)
    ###########################################################################
    - name: Get all PV names
      ansible.builtin.shell: |
        {{ kubectl_bin }} get pv -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}'
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: all_pvs
      changed_when: false
      failed_when: false

    - name: Remove finalizers from all PVs
      ansible.builtin.shell: |
        {{ kubectl_bin }} patch pv {{ item }} -p '{"metadata":{"finalizers":null}}' --ignore-not-found=true
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      loop: "{{ all_pvs.stdout_lines | select('match', '.+') | list }}"
      when: all_pvs.stdout_lines | length > 0
      failed_when: false
      changed_when: false

    - name: Delete all PVs
      ansible.builtin.shell: |
        {{ kubectl_bin }} delete pv --all --wait=false --ignore-not-found=true
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: pv_delete
      changed_when: "'deleted' in pv_delete.stdout"
      failed_when: false

    - name: Wait for PVs to be removed
      ansible.builtin.shell: |
        for i in $(seq 1 12); do
          count=$({{ kubectl_bin }} get pv --no-headers 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "All PVs removed"
            exit 0
          fi
          echo "Waiting for $count PVs to be removed... attempt $i"
          sleep 5
        done
        echo "Some PVs still remain after timeout (will be cleaned by snap purge)"
        exit 0
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false
      failed_when: false

    ###########################################################################
    # 3) Remove k8s snap (purges /var/snap/k8s/ and all rawfile data)
    ###########################################################################
    - name: Remove k8s snap with purge
      ansible.builtin.command: snap remove k8s --purge
      become: true
      register: snap_remove
      changed_when: snap_remove.rc == 0
      failed_when:
        - snap_remove.rc != 0
        - "'not installed' not in snap_remove.stderr"

    - name: Verify k8s snap is removed
      ansible.builtin.command: snap list k8s
      become: true
      register: snap_check
      failed_when: false
      changed_when: false

    - name: Confirm snap removal
      ansible.builtin.debug:
        msg: "{{ 'k8s snap removed successfully' if snap_check.rc != 0 else 'WARNING: k8s snap still present' }}"

    ###########################################################################
    # 4) Clean up leftover rawfile loop devices
    ###########################################################################
    - name: Find leftover rawfile loop devices
      ansible.builtin.shell: |
        losetup -l 2>/dev/null | grep -E 'rawfile|k8s' | awk '{print $1}' || true
      become: true
      register: loop_devices
      changed_when: false
      failed_when: false

    - name: Detach leftover loop devices
      ansible.builtin.command: losetup -d {{ item }}
      become: true
      loop: "{{ loop_devices.stdout_lines | select('match', '.+') | list }}"
      when: loop_devices.stdout_lines | length > 0
      failed_when: false
      changed_when: true

    ###########################################################################
    # 5) Clean up any leftover snap directories
    ###########################################################################
    - name: Remove leftover /var/snap/k8s if still present
      ansible.builtin.file:
        path: /var/snap/k8s
        state: absent
      become: true
      failed_when: false

    - name: Remove leftover /var/lib/k8s-containerd if present
      ansible.builtin.file:
        path: /var/lib/k8s-containerd
        state: absent
      become: true
      failed_when: false

    ###########################################################################
    # 6) Summary
    ###########################################################################
    - name: Display teardown summary
      ansible.builtin.debug:
        msg:
          - "k8s cluster teardown complete"
          - "----------------------------------------"
          - "- All PVCs deleted"
          - "- All PVs deleted"
          - "- k8s snap removed (--purge)"
          - "- Leftover loop devices detached"
          - "- /var/snap/k8s cleaned up"
          - "----------------------------------------"
          - "Ready for fresh reinstall:"
          - "  ./scripts/tk_ansible ansible/40_thinkube/core/infrastructure/k8s/10_install_k8s.yaml"
