# Build venvs for a single architecture, copy tarballs out, clean up PVC
# Called from 99_build_venvs.yaml with target_arch set to arm64 or amd64
#
# Each arch gets its own PVC (csi-rawfile-default is node-local, so a PVC
# bound on an arm64 node cannot be mounted on an amd64 node).

- name: "Display build start for {{ target_arch }}"
  ansible.builtin.debug:
    msg: "Building venvs for {{ target_arch }}..."

# ── PVC ──────────────────────────────────────────────────────────
- name: "Create PVC for {{ target_arch }} build"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{ build_pvc_name }}-{{ target_arch }}"
        namespace: "{{ build_namespace }}"
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: csi-rawfile-default
        resources:
          requests:
            storage: 50Gi

# ── Build job ────────────────────────────────────────────────────
- name: "Delete existing build job for {{ target_arch }}"
  kubernetes.core.k8s:
    state: absent
    api_version: batch/v1
    kind: Job
    name: "venvs-builder-{{ target_arch }}"
    namespace: "{{ build_namespace }}"
    wait: true
    wait_timeout: 60
  ignore_errors: true

- name: "Create venvs build job for {{ target_arch }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: "venvs-builder-{{ target_arch }}"
        namespace: "{{ build_namespace }}"
      spec:
        ttlSecondsAfterFinished: 3600
        backoffLimit: 0
        template:
          spec:
            restartPolicy: Never
            initContainers:
              - name: fix-permissions
                image: "{{ harbor_registry }}/library/busybox:latest"
                command: ["sh", "-c", "chown -R 1000:100 /output"]
                securityContext:
                  runAsUser: 0
                volumeMounts:
                  - name: output
                    mountPath: /output
            containers:
              - name: builder
                image: "{{ harbor_registry }}/library/tk-jupyter-base:latest"
                imagePullPolicy: Always
                command:
                  - bash
                  - /scripts/build-venvs.sh
                env:
                  - name: VENVS_VERSION
                    value: "{{ venvs_version }}"
                  - name: OUTPUT_DIR
                    value: /output
                  - name: DEVPI_INDEX_URL
                    value: "https://{{ devpi_api_hostname }}/root/{{ devpi_index_name }}/+simple/"
                volumeMounts:
                  - name: build-script
                    mountPath: /scripts
                  - name: output
                    mountPath: /output
                resources:
                  requests:
                    memory: "8Gi"
                    cpu: "2"
                  limits:
                    memory: "16Gi"
                    cpu: "4"
            volumes:
              - name: build-script
                configMap:
                  name: venvs-build-script
                  defaultMode: 0755
              - name: output
                persistentVolumeClaim:
                  claimName: "{{ build_pvc_name }}-{{ target_arch }}"
            nodeSelector:
              kubernetes.io/arch: "{{ target_arch }}"
              nvidia.com/gpu.present: "true"

- name: "Wait for {{ target_arch }} build job to complete (20-40 minutes)"
  kubernetes.core.k8s_info:
    api_version: batch/v1
    kind: Job
    name: "venvs-builder-{{ target_arch }}"
    namespace: "{{ build_namespace }}"
  register: job_info
  until: >
    (job_info.resources[0].status.succeeded is defined and job_info.resources[0].status.succeeded == 1) or
    (job_info.resources[0].status.failed is defined and job_info.resources[0].status.failed > 0)
  retries: 180
  delay: 20

- name: "Check if {{ target_arch }} build succeeded"
  ansible.builtin.fail:
    msg: "Venvs build for {{ target_arch }} failed! Check logs: kubectl logs job/venvs-builder-{{ target_arch }} -n {{ build_namespace }}"
  when: job_info.resources[0].status.failed is defined and job_info.resources[0].status.failed > 0

# ── Copy tarballs out ────────────────────────────────────────────
- name: "Create helper pod for {{ target_arch }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Pod
      metadata:
        name: "venvs-copy-{{ target_arch }}"
        namespace: "{{ build_namespace }}"
      spec:
        restartPolicy: Never
        containers:
          - name: helper
            image: "{{ harbor_registry }}/library/busybox:latest"
            command: ["sleep", "3600"]
            volumeMounts:
              - name: venvs
                mountPath: /venvs
        volumes:
          - name: venvs
            persistentVolumeClaim:
              claimName: "{{ build_pvc_name }}-{{ target_arch }}"
        nodeSelector:
          kubernetes.io/arch: "{{ target_arch }}"

- name: "Wait for {{ target_arch }} helper pod"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    name: "venvs-copy-{{ target_arch }}"
    namespace: "{{ build_namespace }}"
  register: helper_pod
  until: helper_pod.resources[0].status.phase == "Running"
  retries: 30
  delay: 5

- name: "List {{ target_arch }} tarballs"
  ansible.builtin.shell: |
    {{ kubectl_bin }} exec -n {{ build_namespace }} venvs-copy-{{ target_arch }} -- ls /venvs/
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: pvc_files
  changed_when: false

- name: "Copy {{ target_arch }} tarballs to local"
  ansible.builtin.shell: |
    kubectl cp {{ build_namespace }}/venvs-copy-{{ target_arch }}:/venvs/{{ item }} {{ local_output_dir }}/{{ item }}
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"
  loop: "{{ pvc_files.stdout_lines | select('match', '.*\\.tar\\.gz$') | list }}"
  delegate_to: localhost

- name: "Display {{ target_arch }} tarballs copied"
  ansible.builtin.debug:
    msg: "Copied {{ target_arch }} tarballs: {{ pvc_files.stdout_lines | select('match', '.*\\.tar\\.gz$') | list }}"

# ── Clean up ─────────────────────────────────────────────────────
- name: "Delete {{ target_arch }} helper pod"
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Pod
    name: "venvs-copy-{{ target_arch }}"
    namespace: "{{ build_namespace }}"

- name: "Delete {{ target_arch }} build job"
  kubernetes.core.k8s:
    state: absent
    api_version: batch/v1
    kind: Job
    name: "venvs-builder-{{ target_arch }}"
    namespace: "{{ build_namespace }}"
    wait: true
    wait_timeout: 60

- name: "Delete {{ target_arch }} PVC"
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: PersistentVolumeClaim
    name: "{{ build_pvc_name }}-{{ target_arch }}"
    namespace: "{{ build_namespace }}"

- name: "{{ target_arch }} build complete"
  ansible.builtin.debug:
    msg: "Successfully built and copied venvs for {{ target_arch }}"
