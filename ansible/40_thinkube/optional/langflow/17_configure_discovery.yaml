---
# ansible/40_thinkube/optional/langflow/17_configure_discovery.yaml
# Description:
#   Configure service discovery for Langflow by creating a ConfigMap
#   that describes the service endpoints and metadata.
#   This ConfigMap is used by thinkube-control to detect Langflow as installed.
#
# Requirements:
#   - Langflow must be deployed (11_deploy.yaml)
#   - Kubernetes kubectl access
#
# Usage:
#   cd ~/thinkube
#   ./scripts/tk_ansible ansible/40_thinkube/optional/langflow/17_configure_discovery.yaml

- name: Configure Langflow service discovery
  hosts: k8s_control_plane
  gather_facts: true

  vars:
    k8s_namespace: "langflow"
    langflow_fqdn: "langflow.{{ domain_name }}"
    component_version: "{{ lookup('file', playbook_dir + '/VERSION') }}"

  tasks:
    - name: Create service discovery ConfigMap
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: thinkube-service-config
            namespace: "{{ k8s_namespace }}"
            labels:
              thinkube.io/managed: "true"
              thinkube.io/service-type: "optional"
              thinkube.io/service-name: "langflow"
              thinkube.io/component: "langflow"
              thinkube.io/component-version: "{{ component_version }}"
          data:
            service.yaml: |
              service:
                name: langflow
                display_name: "Langflow"
                description: "Low-code AI workflow builder for RAG pipelines and LLM applications"
                type: optional
                category: ai
                icon: /icons/tk_ai.svg
                component_version: "{{ component_version }}"

                endpoints:
                  - name: ui
                    type: http
                    url: "https://{{ langflow_fqdn }}"
                    health_url: "https://{{ langflow_fqdn }}/"
                    description: "Langflow web UI (Keycloak SSO via OAuth2 Proxy)"
                    primary: true

                dependencies:
                  - keycloak
                  - postgresql

                scaling:
                  resource_type: deployment
                  resource_name: langflow
                  namespace: langflow
                  min_replicas: 1
                  can_disable: true

                environment_variables:
                  - name: LANGFLOW_URL
                    value: "https://{{ langflow_fqdn }}"

    - name: Verify ConfigMap creation
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: ConfigMap
        name: thinkube-service-config
        namespace: "{{ k8s_namespace }}"
      register: configmap_info

    - name: Display ConfigMap status
      ansible.builtin.debug:
        msg: "Service discovery ConfigMap created for Langflow"
      when: configmap_info.resources | length > 0

    - name: Update code-server environment variables
      include_role:
        name: code_server_env_update
