---
# ansible/40_thinkube/optional/langflow/00_install.yaml
# Description:
#   Orchestrator playbook that runs all Langflow component playbooks in sequence.
#   Deploys Langflow (low-code AI workflow builder) with Keycloak SSO via OAuth2 Proxy.
#
# Requirements:
#   - Kubernetes (k8s-snap) must be installed and running
#   - Keycloak must be deployed (CORE-006)
#   - PostgreSQL must be deployed (CORE-002)
#   - ADMIN_PASSWORD environment variable set
#
# Usage:
#   cd ~/thinkube
#   ./scripts/tk_ansible ansible/40_thinkube/optional/langflow/00_install.yaml

- name: Langflow - Deploy
  import_playbook: 11_deploy.yaml

- name: Langflow - Test
  import_playbook: 18_test.yaml
