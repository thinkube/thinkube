---
# ansible/40_thinkube/optional/headlamp/17_configure_discovery.yaml
# Description:
#   Configure service discovery for Headlamp by creating a ConfigMap
#   that describes the service endpoints and metadata.
#   Registers Headlamp as an optional service so thinkube-control lists it
#   in the optional-component catalog.
#
# Requirements:
#   - Kubernetes (k8s-snap) must be installed and running
#   - Headlamp must be deployed (11_deploy.yaml)
#
# Usage:
#   cd ~/thinkube
#   ./scripts/run_ansible.sh ansible/40_thinkube/optional/headlamp/17_configure_discovery.yaml
#
# Variables from inventory:
#   - domain_name: Base domain for the cluster
#   - kubeconfig: Path to kubeconfig file
#
# 🤖 [AI-generated]

- name: Configure Headlamp service discovery
  hosts: k8s_control_plane
  gather_facts: true

  vars:
    component_version: "{{ lookup('file', playbook_dir + '/VERSION') }}"
    headlamp_namespace: headlamp
    headlamp_hostname: "headlamp.{{ domain_name }}"

  tasks:
    - name: Verify required variables are defined
      ansible.builtin.assert:
        that:
          - domain_name is defined
          - kubeconfig is defined
        fail_msg: "Required variables are not defined"

    - name: Create service discovery ConfigMap
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: thinkube-service-config
            namespace: "{{ headlamp_namespace }}"
            labels:
              thinkube.io/managed: "true"
              thinkube.io/service-type: "optional"
              thinkube.io/service-name: "headlamp"
              thinkube.io/component-version: "{{ component_version }}"
          data:
            service.yaml: |
              service:
                name: headlamp
                display_name: "Headlamp"
                description: "Web-based Kubernetes dashboard for cluster visibility and management"
                type: optional
                category: devops
                icon: /icons/tk_dashboard.svg
                component_version: "{{ component_version }}"

                endpoints:
                  - name: web
                    type: http
                    url: "https://{{ headlamp_hostname }}"
                    health_url: "https://{{ headlamp_hostname }}"
                    description: "Headlamp web interface (Keycloak SSO)"
                    primary: true

                dependencies: []

                scaling:
                  resource_type: deployment
                  resource_name: headlamp
                  namespace: "{{ headlamp_namespace }}"
                  min_replicas: 1
                  can_disable: true

    - name: Verify ConfigMap creation
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: ConfigMap
        name: thinkube-service-config
        namespace: "{{ headlamp_namespace }}"
      register: configmap_info

    - name: Display ConfigMap status
      ansible.builtin.debug:
        msg: "Service discovery ConfigMap created for Headlamp"
      when: configmap_info.resources | length > 0

    - name: Update code-server environment variables
      include_role:
        name: code_server_env_update
