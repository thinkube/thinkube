---
# ansible/40_thinkube/optional/headlamp/19_rollback.yaml
# Description:
#   Rollback/uninstall playbook for Headlamp
#   Cleanly removes every Headlamp resource from the cluster so that a
#   subsequent 00_install.yaml succeeds from a clean slate:
#     1. Uninstalls the Headlamp Helm release
#     2. Removes the cluster-scoped RBAC (cluster-admin ClusterRoleBinding /
#        ClusterRole) that survives namespace deletion
#     3. Deletes the headlamp namespace (and all namespaced resources:
#        Deployment, Service, HTTPRoute, copied TLS secret, discovery ConfigMap)
#     4. Removes the Headlamp OIDC client from Keycloak
#
#   The playbook is idempotent: every step tolerates already-absent resources,
#   so it can be re-run safely.
#
# Requirements:
#   - Kubernetes (k8s-snap) must be installed and running
#
# Usage:
#   cd ~/thinkube
#   ./scripts/tk_ansible ansible/40_thinkube/optional/headlamp/19_rollback.yaml
#
# Variables from inventory:
#   - kubeconfig: Path to kubeconfig file
#   - helm_bin: Path to helm binary
#   - domain_name: Base domain for the cluster
#   - keycloak_realm: Keycloak realm name (thinkube)
#   - admin_username: Admin username
#
# 🤖 [AI-generated]

- name: Rollback Headlamp deployment
  hosts: k8s_control_plane
  gather_facts: true

  vars:
    headlamp_namespace: "headlamp"
    headlamp_release_name: "headlamp"
    headlamp_client_id: "headlamp"
    keycloak_url: "https://auth.{{ domain_name }}"
    keycloak_admin_username: "{{ admin_username }}"
    keycloak_admin_password: "{{ lookup('env', 'ADMIN_PASSWORD') | default(lookup('env', 'ANSIBLE_BECOME_PASSWORD'), true) }}"
    keycloak_validate_certs: true

  tasks:
    - name: Verify kubeconfig is defined
      ansible.builtin.assert:
        that:
          - kubeconfig is defined
        fail_msg: "kubeconfig is not defined"

    - name: Check if Headlamp namespace exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: Namespace
        name: "{{ headlamp_namespace }}"
      register: namespace_check

    - name: Uninstall Headlamp Helm release
      ansible.builtin.shell: |
        {{ helm_bin }} uninstall {{ headlamp_release_name }} --namespace {{ headlamp_namespace }}
      become: false
      register: helm_uninstall
      failed_when: false
      changed_when: helm_uninstall.rc == 0
      when: namespace_check.resources | length > 0

    - name: Remove Headlamp cluster-scoped RBAC (survives namespace deletion)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: absent
        api_version: "{{ item.api_version }}"
        kind: "{{ item.kind }}"
        name: "{{ item.name }}"
      loop:
        - api_version: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          name: headlamp
        - api_version: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          name: headlamp-admin
        - api_version: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          name: headlamp
        - api_version: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          name: headlamp-admin
      failed_when: false

    - name: Delete Headlamp namespace (this will delete all resources in the namespace)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        name: "{{ headlamp_namespace }}"
        api_version: v1
        kind: Namespace
        state: absent
        wait: true
        wait_timeout: 300
      when: namespace_check.resources | length > 0

    - name: Remove Headlamp from Keycloak
      when:
        - domain_name is defined
        - admin_username is defined
        - keycloak_admin_password != ""
      block:
        - name: Get Keycloak admin token
          ansible.builtin.uri:
            url: "{{ keycloak_url }}/realms/master/protocol/openid-connect/token"
            method: POST
            body_format: form-urlencoded
            body:
              client_id: admin-cli
              username: "{{ keycloak_admin_username }}"
              password: "{{ keycloak_admin_password }}"
              grant_type: password
            validate_certs: "{{ keycloak_validate_certs }}"
          register: keycloak_token
          failed_when: false

        - name: Get Headlamp client from Keycloak
          ansible.builtin.uri:
            url: "{{ keycloak_url }}/admin/realms/{{ keycloak_realm }}/clients?clientId={{ headlamp_client_id }}"
            method: GET
            headers:
              Authorization: "Bearer {{ keycloak_token.json.access_token }}"
            validate_certs: "{{ keycloak_validate_certs }}"
          register: headlamp_client
          when: keycloak_token is succeeded
          failed_when: false

        - name: Delete Headlamp client from Keycloak
          ansible.builtin.uri:
            url: "{{ keycloak_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ headlamp_client.json[0].id }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ keycloak_token.json.access_token }}"
            validate_certs: "{{ keycloak_validate_certs }}"
            status_code: [204, 404]
          when:
            - keycloak_token is succeeded
            - headlamp_client is succeeded
            - headlamp_client.json | length > 0
          failed_when: false

    - name: Verify namespace is deleted
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: Namespace
        name: "{{ headlamp_namespace }}"
      register: final_check
      failed_when: final_check.resources | length > 0

    - name: Display rollback status
      ansible.builtin.debug:
        msg:
          - "Headlamp has been successfully removed from the cluster"
          - "Helm release '{{ headlamp_release_name }}' uninstalled"
          - "All resources in the {{ headlamp_namespace }} namespace have been deleted"
          - "Cluster-scoped RBAC (ClusterRoleBinding / ClusterRole) removed"
          - "Keycloak client '{{ headlamp_client_id }}' configuration has been removed"
