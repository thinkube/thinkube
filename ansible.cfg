[defaults]
host_key_checking = False
inventory = inventory/inventory.yaml
roles_path = ansible/roles

[privilege_escalation]
become_method=sudo
become_user=root

[ssh_connection]
pipelining = True
# ServerAliveInterval / ServerAliveCountMax kill a wedged multiplex
# session after ~45 s of silence instead of letting it sit until Linux's
# default TCP keepalive fires (which is 2 hours). Without this, an
# SSH ControlMaster channel-close race makes the installer appear stuck
# for a long time before Ansible notices.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=15 -o ServerAliveCountMax=3
